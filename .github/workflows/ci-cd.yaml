name: Python CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/python-demo:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/python-demo:${{ github.sha }}

      - name: Tag Latest Image
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/python-demo:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/python-demo:latest

      - name: Push Latest Tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/python-demo:latest